<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Infrajus Inteligência Pericial</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1f3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .container {
      width: 360px;
      background: rgba(255, 255, 255, 0.06);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .logo {
      width: 120px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 14px;
      font-weight: normal;
      margin-bottom: 25px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #1e90ff;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1877d6;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo-infrajus.png" alt="Infrajus" class="logo"/>

    <h1>Infrajus Inteligência Pericial</h1>
    <h2>Código da Perícia</h2>

    <!-- LOGIN -->
    <input type="text" placeholder="Usuário / Cliente" />
    <input type="password" placeholder="Senha de acesso" />

    <button>Acessar Sistema</button>

    <div class="footer">
      Acesso restrito • Uso pericial autorizado
    </div>

  </div>

</body>
</html>
